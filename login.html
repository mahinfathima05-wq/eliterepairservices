<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login | Elite Repair & Services</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{
            margin:0;
            padding:0;
            background:#f4f7fc;
            font-family:Arial, Helvetica, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-container{

            width:380px;

            background:white;

            padding:35px;

            border-radius:12px;

            box-shadow:0 5px 20px rgba(0,0,0,.15);

        }

        .login-container h1{

            text-align:center;

            color:#2563eb;

            margin-bottom:10px;

        }

        .login-container p{

            text-align:center;

            color:#666;

            margin-bottom:25px;

        }

        .login-container input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:1px solid #ccc;

            border-radius:8px;

            font-size:16px;

            box-sizing:border-box;

        }

        .login-container button{

            width:100%;

            padding:12px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:8px;

            font-size:17px;

            cursor:pointer;

        }

        .login-container button:hover{

            background:#1d4ed8;

        }

        #error{

            color:red;

            text-align:center;

            margin-top:15px;

            font-weight:bold;

        }

    </style>

</head>

<body>

<div class="login-container">

    <h1>Elite Repair</h1>

    <p>Administrator Login</p>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Admin Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

    </form>

    <p id="error"></p>

</div>

<script type="module" src="login.js"></script>

</body>

</html>
